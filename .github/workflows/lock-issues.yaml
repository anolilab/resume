name: "Lock inactive issues and pull requests"

on: # yamllint disable-line rule:truthy
    schedule:
        - cron: "0 * * * *"

permissions:
    contents: "read"
    discussions: "write"
    issues: "write"
    pull-requests: "write"

jobs:
    lock-closed:
        uses: "anolilab/workflows/.github/workflows/lock-closed.yml@802f3b1d00b0ab47c3102b4f4ebd866b9f7f8fcf" # v18.0.3 # main
        with:
            target-repo: "anolilab/resume"
