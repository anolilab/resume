name: "Lint"
on: # yamllint disable-line rule:truthy
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    lint:
        permissions:
            contents: "read"
            pull-requests: "read"
        uses: "anolilab/workflows/.github/workflows/lint.yml@13fa35fefde7f2ad64dbaa108f6421ae3062d711" # v18.0.4
        with:
            lint_eslint: true
            lint_types: false
            lint_attw: false
            lint_package_json: false
            lint_markdown: false
            lint_yaml: true
            lint_actionlint: false
            lint_rust: false
            node_version: "22"
