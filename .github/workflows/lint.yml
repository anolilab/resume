name: "Lint"
on: # yamllint disable-line rule:truthy
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    lint:
        permissions:
            contents: "read"
            pull-requests: "read"
        uses: "anolilab/workflows/.github/workflows/lint.yml@acba5fb15ac98ad23dec1ad233e40e1bb79c1dae" # v19.0.4
        with:
            lint_eslint: true
            lint_types: false
            lint_attw: false
            lint_package_json: false
            lint_markdown: false
            lint_yaml: true
            lint_actionlint: false
            lint_rust: false
            node_version: "22"
