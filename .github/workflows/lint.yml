name: "Lint"
on: # yamllint disable-line rule:truthy
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    lint:
        permissions:
            contents: "read"
            pull-requests: "read"
        uses: "anolilab/workflows/.github/workflows/lint.yml@802f3b1d00b0ab47c3102b4f4ebd866b9f7f8fcf" # v18.0.3
        with:
            lint_eslint: true
            lint_types: false
            lint_attw: false
            lint_package_json: false
            lint_markdown: false
            lint_yaml: true
            lint_actionlint: false
            lint_rust: false
            node_version: "22"
