name: "Lint"
on: # yamllint disable-line rule:truthy
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    lint:
        permissions:
            contents: "read"
            pull-requests: "read"
        uses: "anolilab/workflows/.github/workflows/lint.yml@0a43f1373be806fe25f390a7119dfd7292c6850f" # v18.0.2
        with:
            lint_eslint: true
            lint_types: false
            lint_attw: false
            lint_package_json: false
            lint_markdown: true
            lint_yaml: true
            lint_actionlint: false
            lint_rust: false
            node_version: "22"
