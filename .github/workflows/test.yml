name: "Tests"
on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    test:
        permissions:
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/test.yml@acba5fb15ac98ad23dec1ad233e40e1bb79c1dae" # v19.0.4
        with:
            node_versions: "[\"22\", \"24\"]"
            os_matrix: "[\"ubuntu-latest\"]"
            extra_includes: "[]"
            test_command: "pnpm run test:coverage"
            coverage: false
