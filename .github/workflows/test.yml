name: "Tests"
on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    test:
        permissions:
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/test.yml@0a43f1373be806fe25f390a7119dfd7292c6850f" # v18.0.2
        with:
            node_versions: '["20", "22", "24"]'
            os_matrix: '["ubuntu-latest"]'
            extra_includes: "[]"
            test_command: "pnpm run test:coverage"
            coverage: false
