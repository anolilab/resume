name: "Tests"
on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    test:
        permissions:
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/test.yml@045a2d464dad0661a570c8a3c19f4b32bf9efad9" # v15.3.0+
        with:
            node_versions: '["20", "22", "24"]'
            os_matrix: '["ubuntu-latest"]'
            extra_includes: '[]'
            test_command: "pnpm run test:coverage"
            coverage: false
