name: "Tests"
on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    test:
        permissions:
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/test.yml@13fa35fefde7f2ad64dbaa108f6421ae3062d711" # v18.0.4
        with:
            node_versions: "[\"22\", \"24\"]"
            os_matrix: "[\"ubuntu-latest\"]"
            extra_includes: "[]"
            test_command: "pnpm run test:coverage"
            coverage: false
