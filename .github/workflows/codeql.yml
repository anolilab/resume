name: "CodeQL"
on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    schedule:
        - cron: "0 0 * * 1"
permissions: {}
jobs:
    codeql:
        permissions:
            security-events: "write"
            actions: "read"
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/codeql.yml@802f3b1d00b0ab47c3102b4f4ebd866b9f7f8fcf" # v18.0.3
        with:
            languages: "[\"javascript-typescript\"]"
            branches: "[\"main\"]"
