name: "CodeQL"
on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    schedule:
        - cron: "0 0 * * 1"
permissions: {}
jobs:
    codeql:
        permissions:
            security-events: "write"
            actions: "read"
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/codeql.yml@0a43f1373be806fe25f390a7119dfd7292c6850f" # v18.0.2
        with:
            languages: "[\"javascript-typescript\"]"
            branches: "[\"main\"]"
