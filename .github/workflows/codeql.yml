name: "CodeQL"
on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    schedule:
        - cron: "0 0 * * 1"
permissions: {}
jobs:
    codeql:
        permissions:
            security-events: "write"
            actions: "read"
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/codeql.yml@13fa35fefde7f2ad64dbaa108f6421ae3062d711" # v18.0.4
        with:
            languages: "[\"javascript-typescript\"]"
            branches: "[\"main\"]"
