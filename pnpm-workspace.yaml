allowBuilds:
    esbuild: true
    puppeteer: true
    sharp: true
    unrs-resolver: true

blockExoticSubdeps: true

catalog:
    "@anolilab/commitlint-config": ^10.0.1
    "@anolilab/eslint-config": ^27.0.2
    "@anolilab/lint-staged-config": ^11.0.1
    "@anolilab/prettier-config": ^10.0.1
    "@anolilab/resume-schema": 2.0.3
    "@anolilab/semantic-release-preset": ^13.4.16
    "@anolilab/textlint-config": ^13.0.1
    "@commitlint/cli": ^21.0.2
    "@commitlint/config-conventional": ^21.0.2
    "@eslint/css": ^1.3.0
    "@fontsource/noto-sans-sc": ^5.2.9
    "@fontsource/nunito": ^5.2.7
    "@octokit/rest": ^22.0.1
    "@tailwindcss/postcss": ^4.3.0
    "@types/gravatar": ^1.8.6
    "@types/lodash.capitalize": ^4.2.9
    "@vitest/coverage-v8": 4.1.8
    ajv: ^8.20.0
    ajv-formats: ^3.0.1
    audit-ci: ^7.1.0
    c8: ^11.0.0
    commitizen: ^4.3.1
    cross-env: ^10.1.0
    cssnano: ^8.0.1
    date-fns: ^4.4.0
    deepmerge: ^4.3.1
    eslint: 10.4.1
    esno: ^4.8.0
    gravatar: ^1.8.2
    handlebars: ^4.7.9
    husky: ^9.1.7
    is-ci: ^4.1.0
    lint-staged: ^17.0.7
    lodash.capitalize: ^4.2.1
    postcss: ^8.5.15
    prettier: ^3.8.3
    puppeteer: ^25.1.0
    semantic-release: ^25.0.3
    sort-package-json: ^4.0.0
    tailwindcss: ^4.3.0
    textlint: ^15.7.1
    typescript: ^6.0.3
    vite: 8.0.15
    vite-plugin-favicon2: ^1.1.5
    vite-plugin-handlebars: ^2.0.3
    vite-plugin-static-copy: ^4.1.1
    vitest: ^4.1.8

catalogMode: prefer

cleanupUnusedCatalogs: true

dedupeInjectedDeps: true

disallowWorkspaceCycles: true

ignoreWorkspaceCycles: false

includeWorkspaceRoot: false

injectWorkspacePackages: false

linkWorkspacePackages: true

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
    - vitest
    - "@vitest/*"
    - typescript
    - "@types/*"
    - "@anolilab/*"
    - "@commitlint/*"
    - url-regex-safe@4.0.0
    - "@cypress/request@4.0.1"
    - shell-quote@1.8.4

onlyBuiltDependencies:
    - puppeteer
    - sharp
    - unrs-resolver

overrides:
    body-parser@>=2.2.0 <2.2.1: ">=2.2.2"
    chrono-node@<2.2.4: ">=2.9.1"
    file-type@>=13.0.0 <21.3.1: ">=22.0.1"
    form-data@<2.5.4: ">=4.0.5"
    jpeg-js@<0.4.0: ">=0.4.4"
    jpeg-js@<0.4.4: ">=0.4.4"
    lodash@<=4.17.23: ">=4.18.0"
    lodash@>=4.0.0 <=4.17.22: ">=4.18.1"
    lodash@>=4.0.0 <=4.17.23: ">=4.18.0"
    min-document@<=2.19.0: ">=2.19.2"
    minimist@<0.2.1: ">=1.2.8"
    minimist@<0.2.4: ">=1.2.8"
    phin@<3.7.1: ">=3.7.1"
    qs@<6.14.1: ">=6.15.2"
    request@<=2.88.2: npm:@cypress/request@^4.0.1
    semver: 7.8.2
    sharp@<0.30.5: ">=0.34.5"
    sharp@<0.32.6: ">=0.34.5"
    shell-quote@>=1.1.0 <=1.8.3: ^1.8.4
    tmp@<0.2.6: ">=0.2.6"
    tough-cookie@<4.1.3: ">=6.0.1"
    url-regex@<=5.0.0: npm:url-regex-safe@^4.0.0
    uuid@<11.1.1: ">=14.0.0"
    vite@>=7.0.0 <=7.3.1: ">=7.3.2"
    vite@>=7.1.0 <=7.3.1: ">=7.3.2"
    xml2js@<0.5.0: ">=0.6.2"

preferWorkspacePackages: true

saveWorkspaceProtocol: true

sharedWorkspaceLockfile: true

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
    - cached-factory@0.1.0
    - undici-types@6.21.0
    - undici@5.29.0
